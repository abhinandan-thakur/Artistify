services:
  postgres:
    image: postgres:17
    container_name: artistify-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: targaryen
      POSTGRES_DB: musicdb

    ports:
      - "5433:5432"

    restart: unless-stopped

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d

  redis:
    image: redis:8
    container_name: artistify-redis

    ports:
      - "6380:6379"

    restart: unless-stopped

  auth-service:
    build: 
      context: ./auth-service
    container_name: auth-service

    ports:
      - "8180:8180"
      - "50051:50051"

    restart: unless-stopped

    depends_on:
      - postgres

    env_file:
      - ./auth-service/.env.compose

    environment:
      APP_ENV: compose

      DB_HOST: postgres
      DB_PORT: 5432

      GRPC_HOST: auth-service
      GRPC_PORT: 50051

  music-service:
    build:
      context: ./music-service

    container_name: music-service

    ports:
      - "8081:8080"
    
    restart: unless-stopped

    depends_on:
      - auth-service
      - redis
      - postgres

    env_file:
      - "./music-service/.env.compose"

    environment:
      APP_ENV: compose

      DB_HOST: postgres
      DB_PORT: 5432

      REDIS_HOST: redis
      REDIS_PORT: 6379
  
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    restart: unless-stopped
    depends_on:
      - auth-service
      - redis
    env_file:
      - ./notification-service/.env.compose
    environment:
      APP_ENV: compose
      REDIS_HOST: redis
      REDIS_PORT: 6379

  prometheus:
    image: prom/prometheus
    container_name: prometheus

    ports:
      - "9090:9090"

    restart: unless-stopped
    
    depends_on:
      - auth-service
      - music-service

    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    container_name: grafana

    ports:
      - "3000:3000"

    restart: unless-stopped

    depends_on:
      - prometheus

  k6:
    image: grafana/k6
    container_name: artistify-k6

    depends_on:
      - auth-service
      - music-service

    volumes:
      - ./tests/k6:/scripts

    command:
      - run
      - /scripts/load.js
 
volumes:
  postgres_data: